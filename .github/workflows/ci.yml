name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Build Codex plugin package
        run: node scripts/package-codex-plugin.mjs --clean

      - name: Build target repo bundle
        run: node scripts/package-target-repo-bundle.mjs --clean

  test:
    name: Test
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install test dependencies
        run: sudo apt-get update && sudo apt-get install -y ripgrep

      - name: Configure Git test identity
        run: |
          git config --global user.name "Dev Cadence CI"
          git config --global user.email "dev-cadence-ci@example.invalid"

      - name: Run test suite
        run: bash tests/run-all.sh
